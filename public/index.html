<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Terminal</title>
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      background: #0c0c0c;
      color: #00cc44;
      font-family: 'Courier New', Courier, monospace;
      font-size: 14px;
      height: 100vh;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    /* ── Header bar ── */
    #header {
      padding: 6px 14px;
      font-size: 12px;
      color: #555;
      border-bottom: 1px solid #1a1a1a;
      flex-shrink: 0;
      letter-spacing: 0.03em;
    }
    #header span { color: #00aa33; }

    /* ── Scrollable output ── */
    #output {
      flex: 1;
      overflow-y: auto;
      padding: 14px 14px 6px;
      line-height: 1.6;
    }
    #output::-webkit-scrollbar { width: 4px; }
    #output::-webkit-scrollbar-track { background: transparent; }
    #output::-webkit-scrollbar-thumb { background: #222; border-radius: 2px; }

    .line { white-space: pre-wrap; word-break: break-all; }
    .dim    { color: #3a5a3a; }
    .muted  { color: #555; }
    .ok     { color: #00ff66; }
    .err    { color: #ff4455; }
    .info   { color: #4488ff; }
    .msg    { color: #00cc44; }
    .own    { color: #66ff99; }

    /* ── Input row ── */
    #input-row {
      display: flex;
      align-items: center;
      padding: 8px 14px;
      border-top: 1px solid #1a1a1a;
      flex-shrink: 0;
    }
    #prompt {
      color: #00cc44;
      white-space: nowrap;
      margin-right: 2px;
      user-select: none;
    }
    #input {
      flex: 1;
      background: transparent;
      border: none;
      outline: none;
      color: #00ff66;
      font-family: inherit;
      font-size: inherit;
      caret-color: #00ff66;
    }

    /* blinking block cursor via caret hack */
    @keyframes blink { 0%,100%{opacity:1} 50%{opacity:0} }
  </style>
</head>
<body>

<div id="header">
  Terminal &nbsp;|&nbsp; <span>/help</span> for list of all commands
</div>

<div id="output"></div>

<div id="input-row">
  <span id="prompt"></span>
  <input id="input" type="text" autocomplete="off" spellcheck="false" autofocus />
</div>

<script>
  // ── E2E Encryption (AES-256-GCM via Web Crypto API) ──────
  // Key is derived client-side from the room code. Server only ever sees ciphertext.

  const PBKDF2_SALT    = new TextEncoder().encode('terminal-chat-v1');
  const PBKDF2_ITERS   = 200_000;

  async function deriveKey(roomCode) {
    const raw = await crypto.subtle.importKey(
      'raw', new TextEncoder().encode(roomCode),
      'PBKDF2', false, ['deriveKey']
    );
    return crypto.subtle.deriveKey(
      { name: 'PBKDF2', salt: PBKDF2_SALT, iterations: PBKDF2_ITERS, hash: 'SHA-256' },
      raw,
      { name: 'AES-GCM', length: 256 },
      false,
      ['encrypt', 'decrypt']
    );
  }

  async function encryptMsg(key, plaintext) {
    const iv         = crypto.getRandomValues(new Uint8Array(12));
    const encoded    = new TextEncoder().encode(plaintext);
    const ciphertext = await crypto.subtle.encrypt({ name: 'AES-GCM', iv }, key, encoded);
    const buf        = new Uint8Array(12 + ciphertext.byteLength);
    buf.set(iv, 0);
    buf.set(new Uint8Array(ciphertext), 12);
    return btoa(String.fromCharCode(...buf));
  }

  async function decryptMsg(key, b64) {
    const buf        = Uint8Array.from(atob(b64), c => c.charCodeAt(0));
    const iv         = buf.slice(0, 12);
    const ciphertext = buf.slice(12);
    const decoded    = await crypto.subtle.decrypt({ name: 'AES-GCM', iv }, key, ciphertext);
    return new TextDecoder().decode(decoded);
  }

  // ── state ────────────────────────────────────────────────
  const userId = Math.floor(100000 + Math.random() * 900000).toString();
  let appState   = 'lobby';      // 'lobby' | 'await-code' | 'room'
  let currentRoom = null;
  let roomKey     = null;        // CryptoKey — set when entering a room

  // ── DOM refs ─────────────────────────────────────────────
  const outputEl = document.getElementById('output');
  const inputEl  = document.getElementById('input');
  const promptEl = document.getElementById('prompt');

  // ── helpers ───────────────────────────────────────────────
  function print(text = '', cls = '') {
    const div = document.createElement('div');
    div.className = 'line' + (cls ? ' ' + cls : '');
    div.textContent = text;
    outputEl.appendChild(div);
    outputEl.scrollTop = outputEl.scrollHeight;
  }

  function setPrompt() {
    if (appState === 'room') {
      promptEl.textContent = `${userId}~$ `;
    } else if (appState === 'await-code') {
      promptEl.textContent = 'room code: ';
    } else {
      promptEl.textContent = `${userId}@terminal ~ $ `;
    }
  }

  function showHelp() {
    print();
    print('  Commands', 'ok');
    print('  ────────────────────────────────────', 'dim');
    print('  \\create    Create a new chat room', 'muted');
    print('  \\join      Join an existing chat room', 'muted');
    print('  \\leave     Leave current room', 'muted');
    print('  \\clear     Clear the screen', 'muted');
    print('  /help      Show this help', 'muted');
    print();
  }

  // ── WebSocket ─────────────────────────────────────────────
  const ws = new WebSocket(`${location.protocol === 'https:' ? 'wss' : 'ws'}://${location.host}`);

  ws.onopen = () => {
    ws.send(JSON.stringify({ type: 'init', userId }));
  };

  ws.onclose = () => {
    print();
    print('  Connection lost. Reload to reconnect.', 'err');
  };

  ws.onerror = () => {
    print('  WebSocket error.', 'err');
  };

  ws.onmessage = (ev) => {
    let msg;
    try { msg = JSON.parse(ev.data); } catch { return; }

    if (msg.type === 'created') {
      currentRoom = msg.roomCode;
      deriveKey(msg.roomCode).then(key => {
        roomKey  = key;
        appState = 'room';
        print();
        print(`  Room created!`, 'ok');
        print(`  Code: ${msg.roomCode}   ← share this`, 'ok');
        print(`  E2E encrypted  ·  AES-256-GCM`, 'muted');
        print(`  Waiting for others to join…`, 'muted');
        print();
        setPrompt();
      });
    }

    else if (msg.type === 'joined') {
      currentRoom = msg.roomCode;
      deriveKey(msg.roomCode).then(key => {
        roomKey  = key;
        appState = 'room';
        print();
        print(`  Joined room ${msg.roomCode}`, 'ok');
        print(`  E2E encrypted  ·  AES-256-GCM`, 'muted');
        print();
        setPrompt();
      });
    }

    else if (msg.type === 'message') {
      if (!roomKey) return;
      decryptMsg(roomKey, msg.text).then(plaintext => {
        print(`${msg.userId}~$ ${plaintext}`, 'msg');
      }).catch(() => {
        print(`${msg.userId}~$ [decryption failed]`, 'err');
      });
    }

    else if (msg.type === 'system') {
      print(`  [${msg.message}]`, 'muted');
    }

    else if (msg.type === 'error') {
      print(`  Error: ${msg.message}`, 'err');
      if (appState === 'await-code') {
        appState = 'lobby';
        setPrompt();
      }
    }
  };

  // ── Input handling ────────────────────────────────────────
  inputEl.addEventListener('keydown', (e) => {
    if (e.key !== 'Enter') return;

    const raw   = inputEl.value;
    const value = raw.trim();
    inputEl.value = '';

    if (!value) return;

    // ── inside a room ──
    if (appState === 'room') {
      const cmd = value.toLowerCase().replace(/^[\\\/]/, '');

      if (cmd === 'leave') {
        location.reload();
        return;
      }
      if (cmd === 'clear') {
        outputEl.innerHTML = '';
        return;
      }

      // regular chat message — encrypt before sending
      print(`${userId}~$ ${value}`, 'own');
      encryptMsg(roomKey, value).then(cipher => {
        ws.send(JSON.stringify({ type: 'message', text: cipher }));
      });
      return;
    }

    // ── awaiting room code ──
    if (appState === 'await-code') {
      print(`room code: ${value}`, 'muted');
      if (!/^\d{6}$/.test(value)) {
        print('  Invalid code — must be exactly 6 digits.', 'err');
        return;
      }
      ws.send(JSON.stringify({ type: 'join', roomCode: value }));
      return;
    }

    // ── lobby ──
    print(`${userId}@terminal ~ $ ${value}`, 'muted');

    const cmd = value.toLowerCase().replace(/^[\\\/]/, '');

    if (cmd === 'help') {
      showHelp();
    }
    else if (cmd === 'create') {
      ws.send(JSON.stringify({ type: 'create' }));
    }
    else if (cmd === 'join') {
      appState = 'await-code';
      print('  Enter the 6-digit room code:', 'muted');
      setPrompt();
    }
    else if (cmd === 'clear') {
      outputEl.innerHTML = '';
    }
    else {
      print(`  Unknown command: "${value}"  —  type /help`, 'err');
    }
  });

  // ── Boot splash ───────────────────────────────────────────
  print('  ████████╗███████╗██████╗ ███╗   ███╗██╗███╗   ██╗ █████╗ ██╗', 'dim');
  print('     ██╔══╝██╔════╝██╔══██╗████╗ ████║██║████╗  ██║██╔══██╗██║', 'dim');
  print('     ██║   █████╗  ██████╔╝██╔████╔██║██║██╔██╗ ██║███████║██║', 'dim');
  print('     ██║   ██╔══╝  ██╔══██╗██║╚██╔╝██║██║██║╚██╗██║██╔══██║██║', 'dim');
  print('     ██║   ███████╗██║  ██║██║ ╚═╝ ██║██║██║ ╚████║██║  ██║███████╗', 'dim');
  print('     ╚═╝   ╚══════╝╚═╝  ╚═╝╚═╝     ╚═╝╚═╝╚═╝  ╚═══╝╚═╝  ╚═╝╚══════╝', 'dim');
  print();
  print('  v1.1.0  ·  anonymous terminal chat  ·  E2E encrypted', 'muted');
  print('  ─────────────────────────────────────────────────────────────', 'dim');
  print(`  Session  ${userId}`, 'muted');
  print('  Type /help for available commands.', 'muted');
  print();

  setPrompt();
  inputEl.focus();

  // keep focus on click anywhere
  document.addEventListener('click', () => inputEl.focus());

  // disable right click
  document.addEventListener('contextmenu', e => e.preventDefault());
</script>
</body>
</html>
